<!DOCTYPE html>
<html>
<head>
<title>Order Ulcer Medicine</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#f9f9f9; }
h1 { text-align:center; color:#4CAF50; }
form { max-width:500px; margin:auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
label { display:block; margin-top:10px; font-weight:bold; }
input, textarea { width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
button { margin-top:15px; padding:12px 25px; background:#4CAF50; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer; }
a { display:block; text-align:center; margin-top:15px; color:#4CAF50; text-decoration:none; }
</style>
</head>
<body>

<h1>Order Ulcer Healing Medicine</h1>

<form onsubmit="sendWhatsApp(event)">
<label>Name</label>
<input type="text" id="name" required>

<label>Phone Number</label>
<input type="text" id="phone" required>

<label>Address</label>
<textarea id="address" required></textarea>

<label>Quantity</label>
<input type="number" id="quantity" value="1" min="1">

<button type="submit">Submit Order</button>
</form>

<a href="index.html">Back to Home</a>

<script>
const unitPrice = 60; // Price per bottle in Rands

function sendWhatsApp(e){
    e.preventDefault();
    let name = document.getElementById('name').value;
    let phone = document.getElementById('phone').value;
    let address = document.getElementById('address').value;
    let quantity = parseInt(document.getElementById('quantity').value);
    let totalPrice = unitPrice * quantity;
    
    let message = `Hi, I want to order ${quantity} Ulcer Healing Medicine(s). Total: R${totalPrice}%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}`;
    window.open(`https://wa.me/27834724696?text=${message}`, '_blank');
}
</script>

</body>
</html>
